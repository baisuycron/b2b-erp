<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B2B ERP 网页商城原型</title>
  <style>
    :root{
      --primary:#4e7cff;
      --primary-hover:#6b8fff;
      --primary-light:#eef3ff;
      --danger:#ff4d4f;
      --success:#52c41a;
      --warning:#faad14;
      --purple:#722ed1;
      --text-main:#1f1f1f;
      --text-normal:#333;
      --text-sub:#666;
      --text-help:#999;
      --border:#e5e6eb;
      --bg:#f5f7fa;
      --card:#fff;
      --table-head:#fafafa;
      --radius:10px;
      --shadow:0 6px 20px rgba(0,0,0,.06);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text-main);
      font-size:14px;
    }

    .topbar{
      height:64px;
      background:#fff;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      position:sticky;
      top:0;
      z-index:50;
    }

    .top-inner{
      width:1200px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      font-size:19px;
      cursor:pointer;
      white-space:nowrap;
    }

    .logo-mark{
      width:36px;
      height:36px;
      border-radius:10px;
      background:linear-gradient(135deg,#4e7cff,#8bb1ff);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
    }

    .search{
      flex:1;
      max-width:520px;
      display:flex;
      height:38px;
      border:2px solid var(--primary);
      border-radius:999px;
      overflow:hidden;
      background:#fff;
    }

    .search input{
      flex:1;
      border:0;
      outline:0;
      padding:0 16px;
      font-size:14px;
    }

    .search button{
      width:92px;
      border:0;
      background:var(--primary);
      color:#fff;
      cursor:pointer;
      font-weight:600;
    }

    .user-actions{
      display:flex;
      align-items:center;
      gap:14px;
      color:var(--text-sub);
      white-space:nowrap;
    }

    .link{
      color:var(--primary);
      cursor:pointer;
    }

    .cart-entry{
      height:36px;
      padding:0 14px;
      border:1px solid var(--border);
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      background:#fff;
      position:relative;
    }

    .cart-count{
      min-width:18px;
      height:18px;
      border-radius:99px;
      background:var(--danger);
      color:#fff;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 5px;
    }

    .nav{
      background:#fff;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:center;
    }

    .nav-inner{
      width:1200px;
      display:flex;
      align-items:center;
      height:44px;
      gap:6px;
    }

    .nav-item{
      height:44px;
      display:flex;
      align-items:center;
      padding:0 18px;
      cursor:pointer;
      color:var(--text-normal);
      border-bottom:3px solid transparent;
      transition:.16s;
    }

    .nav-item:hover{
      color:var(--primary);
    }

    .nav-item.active{
      color:var(--primary);
      border-color:var(--primary);
      font-weight:600;
    }
    .side-shortcuts{
      position:fixed;
      right:24px;
      top:180px;
      z-index:40;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .side-shortcut{
      width:88px;
      min-height:72px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      transition:.16s;
      text-align:center;
      padding:10px 8px;
      color:var(--text-normal);
    }

    .side-shortcut:hover{
      transform:translateY(-2px);
      border-color:var(--primary);
      color:var(--primary);
      background:#fff;
    }

    .side-shortcut-icon{
      font-size:18px;
      line-height:1;
    }

    .side-shortcut-label{
      font-size:13px;
      line-height:1.3;
    }

    .side-shortcut.has-badge{
      position:relative;
    }

    .side-shortcut-badge{
      position:absolute;
      top:8px;
      right:10px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:#ff6b6b;
      color:#fff;
      font-size:12px;
      line-height:18px;
      font-weight:700;
      text-align:center;
      box-shadow:0 2px 6px rgba(255,107,107,.35);
    }

    .page{
      width:1200px;
      margin:20px auto 40px;
    }

    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 1px 2px rgba(0,0,0,.02);
      margin-bottom:16px;
    }

    .card-header{
      height:52px;
      border-bottom:1px solid var(--border);
      padding:0 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .card-title{
      font-weight:700;
      font-size:16px;
    }

    .btn{
      height:34px;
      padding:0 14px;
      border:1px solid var(--border);
      border-radius:7px;
      background:#fff;
      color:var(--text-normal);
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      transition:.16s;
      font-family:inherit;
      font-size:14px;
      white-space:nowrap;
    }

    .btn:hover{
      border-color:var(--primary);
      color:var(--primary);
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .btn-primary:hover{
      background:var(--primary-hover);
      color:#fff;
    }

    .btn-danger{
      background:#fff1f0;
      color:var(--danger);
      border-color:#ffa39e;
    }

    .btn-danger:hover{
      background:var(--danger);
      color:#fff;
      border-color:var(--danger);
    }

    .btn-text{
      border:0;
      height:auto;
      padding:0 4px;
      color:var(--primary);
      background:transparent;
    }

    .btn-text-danger{
      border:0;
      height:auto;
      padding:0 4px;
      color:var(--danger);
      background:transparent;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      height:24px;
      padding:0 8px;
      border-radius:4px;
      font-size:12px;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .tag-blue{color:var(--primary);background:#eef3ff;border-color:#b8c8ff}
    .tag-green{color:var(--success);background:#f6ffed;border-color:#b7eb8f}
    .tag-orange{color:#d48806;background:#fff7e6;border-color:#ffd591}
    .tag-red{color:var(--danger);background:#fff1f0;border-color:#ffa39e}
    .tag-purple{color:var(--purple);background:#f9f0ff;border-color:#d3adf7}
    .tag-gray{color:#666;background:#f5f5f5;border-color:#d9d9d9}

    .hero{
      display:grid;
      grid-template-columns:240px 1fr 260px;
      gap:16px;
      margin-bottom:16px;
    }

    .category-panel{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
    }

    .category-title{
      height:46px;
      display:flex;
      align-items:center;
      padding:0 16px;
      font-weight:700;
      border-bottom:1px solid var(--border);
    }

    .category-item{
      height:42px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px;
      cursor:pointer;
      color:var(--text-normal);
      transition:.16s;
    }

    .category-item:hover{
      background:var(--primary-light);
      color:var(--primary);
    }

    .banner{
      min-height:280px;
      border-radius:var(--radius);
      background:linear-gradient(135deg,#1e2b56,#4e7cff 58%,#9fbeff);
      color:#fff;
      padding:36px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    .banner::after{
      content:"";
      position:absolute;
      right:-80px;
      bottom:-120px;
      width:360px;
      height:360px;
      border-radius:50%;
      background:rgba(255,255,255,.15);
    }

    .banner h1{
      margin:0 0 12px;
      font-size:32px;
      position:relative;
      z-index:1;
    }

    .banner p{
      margin:0 0 24px;
      line-height:1.8;
      font-size:15px;
      color:rgba(255,255,255,.88);
      position:relative;
      z-index:1;
    }

    .banner .btn{
      width:max-content;
      position:relative;
      z-index:1;
    }

    .user-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
    }

    .buyer-info{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .buyer-avatar{
      width:44px;
      height:44px;
      border-radius:50%;
      background:var(--primary-light);
      color:var(--primary);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
    }

    .quick-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .quick-item{
      border:1px solid var(--border);
      border-radius:8px;
      padding:12px;
      cursor:pointer;
      transition:.16s;
    }

    .quick-item:hover{
      border-color:var(--primary);
      color:var(--primary);
    }

    .section-title{
      font-size:18px;
      font-weight:700;
      margin:24px 0 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
    }

    .product-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      cursor:pointer;
      transition:.16s;
    }

    .product-card:hover{
      transform:translateY(-2px);
      box-shadow:var(--shadow);
      border-color:#c6d6ff;
    }

    .product-img{
      height:160px;
      background:linear-gradient(135deg,#eef3ff,#fff7e6);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      font-weight:700;
      font-size:22px;
    }

    .product-body{
      padding:14px;
    }

    .product-name{
      font-weight:700;
      margin-bottom:8px;
      line-height:1.4;
      min-height:40px;
    }


    .price{
      color:#d4380d;
      font-size:20px;
      font-weight:800;
      margin-bottom:10px;
    }

    .price small{
      font-size:12px;
      color:var(--text-help);
      font-weight:400;
      margin-left:4px;
    }

    .list-layout{
      display:grid;
      grid-template-columns:220px 1fr;
      gap:16px;
    }

    .filter-side{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;
      height:max-content;
    }

    .filter-title{
      font-weight:700;
      margin:12px 0 10px;
    }

    .filter-option{
      height:32px;
      display:flex;
      align-items:center;
      padding:0 8px;
      border-radius:6px;
      cursor:pointer;
      color:var(--text-sub);
    }

    .filter-option:hover,
    .filter-option.active{
      background:var(--primary-light);
      color:var(--primary);
    }

    .sort-bar{
      height:48px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      margin-bottom:16px;
    }

    .sort-options{
      display:flex;
      gap:8px;
    }

    .sort-option{
      height:30px;
      padding:0 12px;
      border:1px solid var(--border);
      border-radius:6px;
      display:flex;
      align-items:center;
      cursor:pointer;
      color:var(--text-sub);
    }

    .sort-option.active{
      color:var(--primary);
      border-color:var(--primary);
      background:var(--primary-light);
    }

    .detail-layout{
      display:grid;
      grid-template-columns:430px 1fr;
      gap:20px;
    }

    .detail-img{
      height:430px;
      background:linear-gradient(135deg,#eef3ff,#fff7e6);
      border:1px solid var(--border);
      border-radius:var(--radius);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      font-size:34px;
      font-weight:800;
    }

    .thumb-row{
      display:flex;
      gap:10px;
      margin-top:12px;
    }

    .thumb{
      width:74px;
      height:74px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      cursor:pointer;
    }

    .detail-info{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
    }

    .detail-name{
      font-size:22px;
      font-weight:800;
      margin:0 0 10px;
    }

    .detail-desc{
      color:var(--text-sub);
      line-height:1.6;
      margin-bottom:16px;
    }

    .quote-box{
      background:#fff7e6;
      border:1px solid #ffd591;
      border-radius:8px;
      padding:14px;
      margin-bottom:16px;
    }

    .spec-group{
      margin:18px 0;
    }

    .spec-title{
      color:var(--text-sub);
      margin-bottom:10px;
    }

    .spec-options{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .spec-option{
      min-width:88px;
      height:36px;
      padding:0 12px;
      border:1px solid var(--border);
      border-radius:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      background:#fff;
    }

    .spec-option.active{
      border-color:var(--primary);
      color:var(--primary);
      background:var(--primary-light);
      font-weight:600;
    }

    .qty{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:0;
      height:38px;
      border:1px solid var(--border);
      border-radius:8px;
      overflow:hidden;
      background:#fff;
      vertical-align:middle;
    }

    .qty button{
      width:36px;
      height:38px;
      border:0;
      background:#fafbff;
      cursor:pointer;
      font-size:18px;
      color:var(--text-normal);
      transition:.15s;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .qty button:hover{
      background:#f3f6ff;
      color:var(--primary);
    }

    .qty button:disabled{
      background:#f5f5f5;
      color:#c0c4cc;
      cursor:not-allowed;
    }

    .qty input{
      width:56px;
      height:38px;
      border:0;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
      text-align:center;
      outline:0;
      font-weight:600;
      background:#fff;
    }

    .detail-actions{
      display:flex;
      gap:12px;
      margin-top:22px;
    }

    .detail-actions .btn{
      height:42px;
      min-width:130px;
      font-size:15px;
    }

    .auth-page{
      min-height:560px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 0;
    }

    .auth-card{
      width:430px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 12px 32px rgba(0,0,0,.08);
      padding:28px;
    }

    .auth-title{
      font-size:24px;
      font-weight:800;
      margin-bottom:6px;
    }

    .auth-sub{
      color:var(--text-help);
      margin-bottom:24px;
    }

    .auth-form{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .auth-label{
      font-weight:600;
      margin-bottom:6px;
    }

    .auth-switch{
      margin-top:18px;
      text-align:center;
      color:var(--text-sub);
    }

    .order-tabs{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      padding:12px 16px 16px 16px;
      border-bottom:1px solid var(--border);
    }

    .order-tab{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 14px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      color:var(--text-sub);
      cursor:pointer;
      transition:.15s;
      user-select:none;
    }

    .order-tab:hover{
      border-color:var(--primary);
      color:var(--primary);
      background:#f8faff;
    }

    .order-tab.active{
      border-color:var(--primary);
      color:var(--primary);
      background:#eef3ff;
      font-weight:600;
    }

    .order-tab-count{
      min-width:18px;
      height:18px;
      line-height:18px;
      padding:0 6px;
      border-radius:999px;
      font-size:12px;
      color:#8c8c8c;
      background:#f5f5f5;
      text-align:center;
    }

    .order-tab.active .order-tab-count{
      color:var(--primary);
      background:#dfe8ff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th{
      background:var(--table-head);
      text-align:left;
      padding:13px 14px;
      border-bottom:1px solid var(--border);
      color:var(--text-normal);
      font-weight:700;
    }

    td{
      padding:13px 14px;
      border-bottom:1px solid var(--border);
      color:var(--text-normal);
      vertical-align:middle;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    tbody tr:hover{
      background:#fafcff;
    }

    .cart-product{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .cart-img{
      width:58px;
      height:58px;
      border-radius:8px;
      background:linear-gradient(135deg,#eef3ff,#fff7e6);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      font-weight:700;
      flex-shrink:0;
    }

    .cart-footer{
      height:62px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 18px;
      position:sticky;
      bottom:0;
      z-index:20;
      box-shadow:0 -4px 16px rgba(0,0,0,.04);
    }

    .total{
      color:#d4380d;
      font-size:22px;
      font-weight:800;
    }

    .form-grid{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:14px;
      align-items:center;
    }

    .label{
      color:var(--text-sub);
      text-align:right;
    }

    .input,.select,.textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:7px;
      height:36px;
      padding:0 10px;
      outline:0;
      font-family:inherit;
      font-size:14px;
      background:#fff;
    }

    .textarea{
      height:82px;
      padding:8px 10px;
      resize:none;
      line-height:1.6;
    }

    .input:focus,.select:focus,.textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(78,124,255,.12);
    }

    .address-card{
      border:1px solid var(--border);
      border-radius:10px;
      padding:14px;
      margin-bottom:10px;
      cursor:pointer;
      position:relative;
      transition:.16s;
    }

    .address-card.active{
      border-color:var(--primary);
      background:var(--primary-light);
    }

    .address-name{
      font-weight:700;
      margin-bottom:6px;
    }

    .address-detail{
      color:var(--text-sub);
      line-height:1.6;
    }

    .order-steps{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:16px;
    }

    .step{
      background:#fff;
      border:1px solid var(--border);
      border-radius:10px;
      padding:16px;
      text-align:center;
      color:var(--text-help);
    }

    .step.active{
      border-color:var(--primary);
      color:var(--primary);
      background:var(--primary-light);
      font-weight:700;
    }

    .notice{
      padding:12px 14px;
      background:#fffbe6;
      border:1px solid #ffe58f;
      color:#874d00;
      border-radius:8px;
      display:flex;
      gap:10px;
      line-height:1.6;
      margin-bottom:16px;
    }

    .empty{
      padding:60px 20px;
      text-align:center;

    detailSpecQtyMap[specIndex] = next;

  function addCart(jump){
    const selectedItems = Object.entries(detailSpecQtyMap)
      .map(([specIndex, qty]) => ({specIndex:Number(specIndex), qty:Number(qty || 0)}))
      .filter(item => item.qty > 0);

    if(!selectedItems.length){
      showToast('请先填写采购数量');
      return;
    }

    for(const item of selectedItems){
      const spec = currentProduct.specs[item.specIndex];
      if(item.qty > spec.stock){
        showToast(spec.name + ' 库存不足');
        return;
      }
    }

    selectedItems.forEach(item => {
      const found = cart.find(i => i.productId === currentProduct.id && i.specIndex === item.specIndex);
      if(found){
        found.qty += item.qty;
        found.checked = true;
      }else{
        cart.push({productId:currentProduct.id, specIndex:item.specIndex, qty:item.qty, checked:true});
      }
    });

    updateCartCount();
    showToast('已加入购物车');
    if(jump) go('cart');
  }

        <div class="card-header">
          <div class="card-title">发票抬头管理</div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-primary" onclick="openInvoiceTitleModal()">新增发票抬头</button>
          </div>
        </div>

        <div class="order-tabs">
          ${tabs.map(tab => `
            <div class="order-tab ${currentInvoiceTitleTab === tab.key ? 'active' : ''}" onclick="setInvoiceTitleTab('${tab.key}')">
              <span>${tab.label}</span>
              <span class="order-tab-count">${tab.count}</span>
            </div>
          `).join('')}
        </div>

        <table>
          <thead>
            <tr>
              <th style="width:110px">抬头类型</th>
              <th>发票抬头</th>
              <th>纳税人识别号</th>
              <th>注册地址/电话</th>
              <th>开户行/银行账号</th>
              <th style="width:120px">接收邮箱</th>
              <th style="width:80px">默认</th>
              <th style="width:180px">操作</th>
            </tr>
          </thead>
          <tbody>
            ${rows.length ? rows.map(item => `
              <tr>
                <td><span class="tag ${item.type === 'company' ? 'tag-blue' : 'tag-gray'}">${item.type === 'company' ? '企业' : '个人'}</span></td>
                <td>${item.title}</td>
                <td>${item.taxNo || '-'}</td>
                <td>${item.type === 'company' ? `${item.registerAddress || '-'} / ${item.registerPhone || '-'}` : '-'}</td>
                <td>${item.type === 'company' ? `${item.bankName || '-'} / ${item.bankAccount || '-'}` : '-'}</td>
                <td>${item.email || '-'}</td>
                <td>${item.isDefault ? '<span class="tag tag-green">默认</span>' : '-'}</td>
                <td>
                  <button class="btn-text" onclick="openInvoiceTitleModal('${item.id}')">编辑</button>
                  ${item.isDefault ? '' : `<button class="btn-text" onclick="setDefaultInvoiceTitle('${item.id}')">设为默认</button>`}
                  ${item.isDefault ? '' : `<button class="btn-text-danger" onclick="deleteInvoiceTitle('${item.id}')">删除</button>`}
                </td>
              </tr>
            `).join('') : `
              <tr>
                <td colspan="8" style="text-align:center;color:var(--text-help);padding:40px 0">暂无发票抬头</td>
              </tr>
            `}
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">填写规则</div>
        </div>
        <div style="padding:16px;line-height:1.9;color:var(--text-sub)">
          1. 企业抬头申请电子普通发票时，至少需要维护发票抬头、纳税人识别号、接收邮箱。<br>
          2. 企业抬头申请电子增值税专用发票时，还需要维护注册地址、注册电话、开户行和银行账号。<br>
          3. 个人抬头仅支持电子普通发票，不支持电子增值税专用发票。<br>
          4. 默认抬头会在提交开票申请时自动带出，买家也可以手动切换其他抬头。
        </div>
      </div>
    `;
  }

  function setInvoiceTitleTab(tabKey){
    currentInvoiceTitleTab = tabKey;
    pageEl.innerHTML = renderInvoiceTitles();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function setDefaultInvoiceTitle(id){
    invoiceTitleData = invoiceTitleData.map(item => ({
      ...item,
      isDefault:item.id === id
    }));
    pageEl.innerHTML = renderInvoiceTitles();
    showToast('已设为默认抬头');
  }

  function deleteInvoiceTitle(id){
    const item = invoiceTitleData.find(title => title.id === id);
    if(item && item.isDefault){
      showToast('默认抬头不支持删除');
      return;
    }
    invoiceTitleData = invoiceTitleData.filter(title => title.id !== id);
    pageEl.innerHTML = renderInvoiceTitles();
    showToast('发票抬头已删除');
  }

  function renderProfile(){
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-title">个人中心</div>
        </div>
        <div style="padding:20px">
          <div class="form-grid">
            <div class="label">登录手机号</div><div>138****8888</div>
            <div class="label">买家昵称</div><div>杭州采购王</div>
            <div class="label">企业名称</div><div>杭州某某商贸有限公司</div>
            <div class="label">账号状态</div><div><span class="tag tag-green">启用</span></div>
            <div class="label">注册来源</div><div>网页商城</div>
            <div class="label">最近登录</div><div>2026-06-07 10:00</div>
          </div>
          <div style="margin-top:18px;display:flex;gap:10px">
            <button class="btn" onclick="openPasswordModal()">修改密码</button>
            <button class="btn" onclick="go('invoiceTitles')">管理发票抬头</button>
          </div>
        </div>
      </div>
    `;
  }

  function openModal(title, body, footer){
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalFooter').innerHTML = footer || `
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="closeModal();showToast('保存成功')">保存</button>
    `;
    document.getElementById('modalMask').style.display = 'flex';
  }

  function closeModal(){
    document.getElementById('modalMask').style.display = 'none';
  }

  function openRefundApply(){
    openModal('申请退款/售后', `
      <div class="notice"><span>ℹ️</span><div>发货前支持仅退款；发货后支持仅退款或退货退款；收货后在售后期内可申请售后。</div></div>
      <div class="form-grid">
        <div class="label">售后类型</div><select class="select"><option>仅退款</option><option>退货退款</option></select>
        <div class="label">申请商品</div><select class="select"><option>农夫山泉饮用天然水｜550ml / 24瓶</option><option>娃哈哈饮用纯净水｜596ml / 24瓶</option></select>
        <div class="label">申请数量</div><input class="input" value="1">
        <div class="label">退款金额</div><input class="input" value="33.00">
        <div class="label">申请原因</div><select class="select"><option>不想要了</option><option>商品质量问题</option><option>数量拍错</option></select>
        <div class="label">问题描述</div><textarea class="textarea" placeholder="请输入问题描述"></textarea>
      </div>
    `, `
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="closeModal();showToast('售后申请已提交')">提交申请</button>
    `);
  }

  function openInvoiceTitleModal(id=null, presetType='company'){
    const item = id ? invoiceTitleData.find(title => title.id === id) : null;
    const type = item ? item.type : presetType;
    const isPersonal = type === 'personal';

    openModal(item ? '编辑发票抬头' : '新增发票抬头', `
      <div class="notice"><span>ℹ️</span><div>个人抬头仅支持电子普通发票；企业抬头申请电子专票时需完整填写注册地址、注册电话、开户行和银行账号。</div></div>
      <div class="form-grid">
        <div class="label">抬头类型</div>
        <select class="select" id="invoiceTitleType" onchange="switchInvoiceTitleTypeInModal(this.value)">
          <option value="company" ${!isPersonal ? 'selected' : ''}>企业</option>
          <option value="personal" ${isPersonal ? 'selected' : ''}>个人</option>
        </select>

        <div class="label">发票抬头</div>
        <input class="input" id="invoiceTitleName" value="${item ? item.title : (isPersonal ? '李先生' : '')}" placeholder="${isPersonal ? '请输入个人姓名' : '请输入企业名称'}">

        <div class="label company-field">纳税人识别号</div>
        <input class="input company-field" id="invoiceTitleTaxNo" value="${item ? item.taxNo : ''}" placeholder="请输入纳税人识别号">

        <div class="label company-field">注册地址</div>
        <input class="input company-field" id="invoiceTitleAddress" value="${item ? item.registerAddress : ''}" placeholder="申请电子专票时填写">

        <div class="label company-field">注册电话</div>
        <input class="input company-field" id="invoiceTitlePhone" value="${item ? item.registerPhone : ''}" placeholder="申请电子专票时填写">

        <div class="label company-field">开户行</div>
        <input class="input company-field" id="invoiceTitleBank" value="${item ? item.bankName : ''}" placeholder="申请电子专票时填写">

        <div class="label company-field">银行账号</div>
        <input class="input company-field" id="invoiceTitleAccount" value="${item ? item.bankAccount : ''}" placeholder="申请电子专票时填写">

        <div class="label">接收邮箱</div>
        <input class="input" id="invoiceTitleEmail" value="${item ? item.email : 'finance@example.com'}" placeholder="请输入电子发票接收邮箱">

        <div class="label">设为默认</div>
        <select class="select" id="invoiceTitleDefault">
          <option value="yes" ${item && item.isDefault ? 'selected' : ''}>是</option>
          <option value="no" ${item && !item.isDefault ? 'selected' : (!item ? 'selected' : '')}>否</option>
        </select>
      </div>
    `, `
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveInvoiceTitle('${id || ''}')">保存</button>
    `);

    switchInvoiceTitleTypeInModal(type);
  }

  function switchInvoiceTitleTypeInModal(type){
    const isPersonal = type === 'personal';
    document.querySelectorAll('.company-field').forEach(el => {
      el.style.display = isPersonal ? 'none' : '';
    });
  }

  function saveInvoiceTitle(id=''){
    const type = document.getElementById('invoiceTitleType').value;
    const title = document.getElementById('invoiceTitleName').value.trim();
    const taxNo = document.getElementById('invoiceTitleTaxNo')?.value.trim() || '';
    const registerAddress = document.getElementById('invoiceTitleAddress')?.value.trim() || '';
    const registerPhone = document.getElementById('invoiceTitlePhone')?.value.trim() || '';
    const bankName = document.getElementById('invoiceTitleBank')?.value.trim() || '';
    const bankAccount = document.getElementById('invoiceTitleAccount')?.value.trim() || '';
    const email = document.getElementById('invoiceTitleEmail').value.trim();
    const isDefault = document.getElementById('invoiceTitleDefault').value === 'yes';

    if(!title){
      showToast('请填写发票抬头');
      return;
    }
    if(type === 'company' && !taxNo){
      showToast('企业抬头请填写纳税人识别号');
      return;
    }
    if(!email){
      showToast('请填写接收邮箱');
      return;
    }

    if(isDefault){
      invoiceTitleData = invoiceTitleData.map(item => ({...item, isDefault:false}));
    }

    const payload = {
      id:id || ('it-' + Date.now()),
      type,
      title,
      taxNo:type === 'company' ? taxNo : '',
      registerAddress:type === 'company' ? registerAddress : '',
      registerPhone:type === 'company' ? registerPhone : '',
      bankName:type === 'company' ? bankName : '',
      bankAccount:type === 'company' ? bankAccount : '',
      email,
      isDefault
    };

    if(id){
      invoiceTitleData = invoiceTitleData.map(item => item.id === id ? payload : item);
    }else{
      invoiceTitleData.push(payload);
    }

    if(!invoiceTitleData.some(item => item.isDefault) && invoiceTitleData.length){
      invoiceTitleData[0].isDefault = true;
    }

    closeModal();
    pageEl.innerHTML = renderInvoiceTitles();
    showToast('发票抬头已保存');
  }

  function openInvoiceApply(){
    const defaultTitle = invoiceTitleData.find(item => item.isDefault) || invoiceTitleData[0];

    openModal('申请开票', `
      <div class="notice"><span>⚠️</span><div>订单确认收货后可申请开票。个人抬头仅支持电子普通发票；企业抬头可申请电子普通发票或电子增值税专用发票。</div></div>
      <div class="form-grid">
        <div class="label">选择抬头</div>
        <select class="select" id="applyInvoiceTitleSelect" onchange="syncApplyInvoiceTitle()">
          ${invoiceTitleData.map(item => `<option value="${item.id}" ${defaultTitle && item.id === defaultTitle.id ? 'selected' : ''}>${item.title}${item.isDefault ? '（默认）' : ''}</option>`).join('')}
        </select>

        <div class="label">发票类型</div>
        <select class="select" id="applyInvoiceType"></select>

        <div class="label">抬头类型</div><input class="input" id="applyTitleType" readonly>
        <div class="label">发票抬头</div><input class="input" id="applyTitleName" readonly>
        <div class="label">纳税人识别号</div><input class="input" id="applyTaxNo" readonly>
        <div class="label">开票金额</div><input class="input" value="2860.00" readonly>
        <div class="label">接收邮箱</div><input class="input" id="applyEmail">
      </div>
    `, `
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn" onclick="closeModal();go('invoiceTitles')">管理抬头</button>
      <button class="btn btn-primary" onclick="closeModal();showToast('开票申请已提交')">提交申请</button>
    `);

    syncApplyInvoiceTitle();
  }

  function syncApplyInvoiceTitle(){
    const select = document.getElementById('applyInvoiceTitleSelect');
    const item = invoiceTitleData.find(title => title.id === select.value) || invoiceTitleData[0];
    if(!item) return;

    document.getElementById('applyTitleType').value = item.type === 'company' ? '企业' : '个人';
    document.getElementById('applyTitleName').value = item.title;
    document.getElementById('applyTaxNo').value = item.taxNo || '-';
    document.getElementById('applyEmail').value = item.email || '';

    const invoiceTypeSelect = document.getElementById('applyInvoiceType');
    invoiceTypeSelect.innerHTML = item.type === 'company'
      ? '<option>电子普通发票</option><option>电子增值税专用发票</option>'
      : '<option>电子普通发票</option>';
  }

  function openAddressModal(){
    openModal('收货地址', `
      <div class="form-grid">
        <div class="label">收货人</div><input class="input" value="李经理">
        <div class="label">手机号</div><input class="input" value="13888888888">
        <div class="label">所在地区</div><input class="input" value="浙江省 / 杭州市 / 西湖区">
        <div class="label">详细地址</div><textarea class="textarea">文三路188号 3号楼 1201室</textarea>
        <div class="label">默认地址</div><select class="select"><option>是</option><option>否</option></select>
      </div>
    `);
  }

  function openPasswordModal(){
    openModal('修改密码', `
      <div class="notice"><span>ℹ️</span><div>密码长度6-20位，可以纯数字。</div></div>
      <div class="form-grid">
        <div class="label">原密码</div><input class="input" type="password" placeholder="请输入原密码">
        <div class="label">新密码</div><input class="input" type="password" placeholder="请输入新密码">
        <div class="label">确认新密码</div><input class="input" type="password" placeholder="请再次输入新密码">
      </div>
    `);
  }

  document.getElementById('modalMask').addEventListener('click', e => {
    if(e.target.id === 'modalMask') closeModal();
  });

  updateCartCount();
  go('home');
</script>
<script src="commerce-api-adapter.js"></script>
</body>
</html>
