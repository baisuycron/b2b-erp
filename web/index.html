<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B2B ERP 后台完整菜单归类版原型</title>
  <style>
    :root{
      --primary:#4e7cff;
      --primary-hover:#6b8fff;
      --primary-light:#eaf0ff;
      --success:#52c41a;
      --warning:#faad14;
      --danger:#ff4d4f;
      --purple:#722ed1;
      --cyan:#13c2c2;
      --text-main:#1f1f1f;
      --text-normal:#333;
      --text-sub:#666;
      --text-help:#999;
      --border:#e5e6eb;
      --bg:#f5f7fa;
      --card:#fff;
      --table-head:#fafafa;
      --menu-bg:#15171c;
      --menu-hover:#20242d;
      --menu-active:#4e7cff;
      --sidebar-width:190px;
      --sidebar-collapsed-width:72px;
      --sidebar-text:#e9edf5;
      --sidebar-subtext:#a8b0c0;
      --sidebar-divider:rgba(255,255,255,.06);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text-main);
      font-size:14px;
      overflow:hidden;
    }

    .sidebar{
      position:fixed;
      left:0;
      top:0;
      bottom:0;
      width:var(--sidebar-width);
      background:var(--menu-bg);
      color:var(--sidebar-text);
      z-index:80;
      display:flex;
      flex-direction:column;
      transition:width .2s ease;
      border-right:1px solid var(--sidebar-divider);
    }

    .logo{
      height:86px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 18px;
      color:#fff;
      font-size:17px;
      font-weight:700;
      border-bottom:1px solid var(--sidebar-divider);
      flex-shrink:0;
      overflow:hidden;
    }

    .logo-mark{
      width:40px;
      height:40px;
      border-radius:12px;
      background:linear-gradient(135deg,#5d89ff,#7db1ff);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:18px;
      color:#fff;
      flex-shrink:0;
    }

    .logo-text{
      white-space:nowrap;
      font-size:16px;
      letter-spacing:.2px;
    }

    .menu{
      padding:14px 8px 16px;
      overflow:auto;
      flex:1;
    }

    .menu-group{
      margin-bottom:4px;
    }

    .menu-group-title{
      height:44px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 14px;
      border-radius:10px;
      cursor:pointer;
      color:var(--sidebar-text);
      margin-bottom:4px;
      transition:.18s;
      user-select:none;
      position:relative;
      overflow:hidden;
    }

    .menu-group-title:hover{background:var(--menu-hover);color:#fff}
    .menu-group-title.active{background:rgba(78,124,255,.18);color:#fff}

    .menu-icon{
      width:22px;
      min-width:22px;
      height:22px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      opacity:.95;
      color:currentColor;
    }

    .menu-icon svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect:non-scaling-stroke;
    }

    .menu-label{
      flex:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:15px;
    }

    .arrow{
      font-size:12px;
      color:var(--sidebar-subtext);
      transition:transform .18s ease;
      margin-left:auto;
      flex-shrink:0;
    }

    .menu-group-title.active .arrow{color:#dbe4ff}
    .submenu{
      margin:0 0 6px 0;
      display:none;
      padding-left:0;
    }

    .submenu.open{display:block}

    .submenu-item{
      height:40px;
      display:flex;
      align-items:center;
      padding-left:48px;
      padding-right:12px;
      border-radius:10px;
      cursor:pointer;
      color:var(--sidebar-subtext);
      margin-bottom:2px;
      transition:.16s;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      position:relative;
    }

    .submenu-item:hover{background:var(--menu-hover);color:#fff}
    .submenu-item.active{
      background:transparent;
      color:#fff;
    }

    .submenu-item.active::before{
      content:"";
      position:absolute;
      left:14px;
      top:10px;
      bottom:10px;
      width:4px;
      border-radius:99px;
      background:var(--menu-active);
    }

    .sidebar-footer{
      border-top:1px solid var(--sidebar-divider);
      padding:12px 8px;
      flex-shrink:0;
    }

    .collapse-btn{
      width:100%;
      height:42px;
      border:0;
      border-radius:10px;
      background:transparent;
      color:var(--sidebar-text);
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 14px;
      cursor:pointer;
      font-size:15px;
      transition:.18s;
    }

    .collapse-btn:hover{
      background:var(--menu-hover);
    }

    .collapse-icon{
      width:22px;
      min-width:22px;
      text-align:center;
      font-size:18px;
    }

    .main{
      margin-left:var(--sidebar-width);
      margin-left:var(--sidebar-width);
      height:100vh;
      overflow:hidden;
    }

    .topbar{
      position:fixed;
      left:var(--sidebar-width);
      right:0;
      top:0;
      height:56px;
      background:#fff;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px;
      z-index:70;
    }

    .breadcrumb{
      color:var(--text-sub);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .breadcrumb b{color:var(--text-main)}

    .top-actions{
      display:flex;
      align-items:center;
      gap:16px;
      color:var(--text-sub);
    }

    .user-chip{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
    }

    .avatar{
      width:24px;
      height:24px;
      border-radius:50%;
      background:var(--primary-light);
      color:var(--primary);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
    }

    .content{
      position:fixed;
      left:var(--sidebar-width);
      right:0;
      top:56px;
      bottom:0;
      padding:24px;
      overflow:auto;
    }

    .page-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .page-title{font-size:20px;font-weight:600;margin:0 0 6px}
    .page-desc{color:var(--text-sub);margin:0;line-height:1.6}

    .btn{
      height:34px;
      padding:0 14px;
      border:1px solid var(--border);
      border-radius:6px;
      background:#fff;
      color:var(--text-normal);
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      transition:.16s;
      font-size:14px;
      font-family:inherit;
      white-space:nowrap;
    }

    .btn:hover{border-color:var(--primary);color:var(--primary)}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn-primary:hover{background:var(--primary-hover);color:#fff}
    .btn-danger{color:var(--danger);border-color:#ffa39e;background:#fff1f0}
    .btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
    .btn-text{height:auto;border:0;padding:0 4px;background:transparent;color:var(--primary)}
    .btn-text-danger{height:auto;border:0;padding:0 4px;background:transparent;color:var(--danger)}

    .notice{
      padding:12px 14px;
      background:#fffbe6;
      border:1px solid #ffe58f;
      color:#874d00;
      border-radius:8px;
      margin-bottom:16px;
      display:flex;
      align-items:flex-start;
      gap:10px;
      line-height:1.6;
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:2px;
      background:#fff;
      border-radius:8px;
      border:1px solid var(--border);
      padding:4px;
      width:max-content;
      max-width:100%;
      margin-bottom:16px;
    }

    .tab{
      height:34px;
      padding:0 16px;
      border-radius:6px;
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      color:var(--text-sub);
      transition:.16s;
    }

    .tab.active{background:var(--primary);color:#fff}
    .tab:hover{
      background:#f3f6ff;
      color:var(--primary);
    }

    .tab.active:hover{
      background:var(--primary);
      color:#fff;
    }


    .tab .badge{
      min-width:20px;
      height:20px;
      border-radius:999px;
      background:#f0f0f0;
      color:var(--text-sub);
      font-size:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 6px;
    }
    .tab.active .badge{background:rgba(255,255,255,.24);color:#fff}

    .summary-row{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;
      margin-bottom:16px;
    }

    .summary-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:8px;
      padding:16px;
      cursor:pointer;
      transition:.16s;
    }

    .summary-card:hover{
      border-color:#c6ddff;
      box-shadow:0 4px 16px rgba(0,0,0,.06);
      transform:translateY(-1px);
    }

    .summary-title{color:var(--text-sub);margin-bottom:10px}
    .summary-val{font-size:24px;font-weight:700}

    .card{
      background:#fff;
      border-radius:8px;
      border:1px solid var(--border);
      margin-bottom:16px;
      box-shadow:0 1px 2px rgba(0,0,0,.02);
    }

    .card-header{
      height:52px;
      padding:0 18px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .card-title{font-size:16px;font-weight:600}

    .filter-card{padding:18px}

    .filter-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px 16px;
      align-items:end;
    }

    .field label{
      display:block;
      color:var(--text-sub);
      margin-bottom:6px;
    }

    .input,.select,.textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:6px;
      height:34px;
      padding:0 10px;
      outline:none;
      font-family:inherit;
      font-size:14px;
      background:#fff;
    }

    .textarea{
      height:82px;
      padding:8px 10px;
      resize:none;
      line-height:1.6;
    }

    .filter-actions{display:flex;gap:8px}

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th{
      background:var(--table-head);
      color:var(--text-normal);
      font-weight:600;
      text-align:left;
      padding:13px 14px;
      border-bottom:1px solid var(--border);
    }

    td{
      padding:13px 14px;
      border-bottom:1px solid var(--border);
      color:var(--text-normal);
      vertical-align:middle;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    tbody tr:hover{background:#fafcff}

    .tag{
      display:inline-flex;
      align-items:center;
      height:24px;
      padding:0 8px;
      border-radius:4px;
      font-size:12px;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .tag-blue{color:var(--primary);background:#e6f4ff;border-color:#91caff}
    .tag-green{color:var(--success);background:#f6ffed;border-color:#b7eb8f}
    .tag-orange{color:#d48806;background:#fff7e6;border-color:#ffd591}
    .tag-red{color:var(--danger);background:#fff1f0;border-color:#ffa39e}
    .tag-gray{color:#666;background:#f5f5f5;border-color:#d9d9d9}
    .tag-purple{color:var(--purple);background:#f9f0ff;border-color:#d3adf7}
    .tag-cyan{color:#08979c;background:#e6fffb;border-color:#87e8de}

    .tree-layout{
      display:grid;
      grid-template-columns:340px 1fr;
      gap:16px;
    }

    .tree-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px;
      min-height:520px;
    }

    .tree-node{
      min-height:38px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 10px;
      border-radius:6px;
      cursor:pointer;
      margin-bottom:4px;
    }

    .tree-node:hover{background:#f5f7fa}
    .tree-node.active{background:var(--primary-light);color:var(--primary);font-weight:600}
    .tree-indent-1{padding-left:28px}
    .tree-indent-2{padding-left:46px}

    .detail-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px 18px;
    }

    .detail-label{color:var(--text-help);font-size:12px;margin-bottom:6px}
    .detail-val{color:var(--text-normal);font-weight:500;line-height:1.5}

    .drawer-mask{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.32);
      display:none;
      justify-content:flex-end;
      z-index:90;
    }

    .drawer{
      width:920px;
      max-width:94vw;
      height:100vh;
      background:#fff;
      box-shadow:-8px 0 24px rgba(0,0,0,.12);
      display:flex;
      flex-direction:column;
    }

    .drawer.wide{width:1080px}

    .drawer-header{
      height:56px;
      padding:0 20px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight:600;
      font-size:16px;
    }

    .drawer-body{padding:20px;overflow:auto;flex:1}

    .drawer-footer{
      padding:12px 20px;
      border-top:1px solid var(--border);
      display:flex;
      justify-content:flex-end;
      gap:10px;
    }

    .close{cursor:pointer;color:var(--text-help);font-size:18px}

    .section-title{
      font-size:15px;
      font-weight:600;
      margin:22px 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .section-title:first-child{margin-top:0}

    .mini-card{
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px;
      background:#fff;
    }

    .form-grid{
      display:grid;
      grid-template-columns:120px minmax(0,1fr);
      gap:16px 14px;
      align-items:center;
    }

    .label{
      color:var(--text-sub);
      text-align:right;
      line-height:34px;
      align-self:start;
    }

    .required::before{content:"*";color:var(--danger);margin-right:4px}

    .permission-tree{
      border:1px solid var(--border);
      border-radius:8px;
      overflow:hidden;
    }

    .perm-row{
      display:grid;
      grid-template-columns:220px 1fr;
      border-bottom:1px solid var(--border);
      min-height:48px;
      align-items:center;
    }

    .perm-row:last-child{border-bottom:0}
    .perm-menu{
      height:100%;
      background:#fafafa;
      padding:14px;
      border-right:1px solid var(--border);
      font-weight:600;
    }

    .perm-actions{
      padding:10px 14px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .checkbox{
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:var(--text-normal);
      cursor:pointer;
    }

    .checkbox input{width:16px;height:16px}

    .config-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .config-card{
      border:1px solid var(--border);
      border-radius:8px;
      padding:16px;
      background:#fff;
    }

    .config-title{font-weight:600;margin-bottom:12px}

    .toast{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,.78);
      color:#fff;
      padding:10px 14px;
      border-radius:6px;
      display:none;
      z-index:200;
    }


    .summary-card.clickable{
      position:relative;
    }

    .summary-card.clickable::after{
      content:"去处理";
      position:absolute;
      right:16px;
      top:16px;
      font-size:12px;
      color:var(--primary);
      opacity:0;
      transform:translateX(-4px);
      transition:.16s;
    }

    .summary-card.clickable:hover::after{
      opacity:1;
      transform:translateX(0);
    }

    .menu-group-title.active{
      box-shadow:inset 4px 0 0 var(--menu-active);
    }

    .menu-group-title.active{
      background:rgba(78,124,255,.22);
    }

    .submenu-item.active{
      background:transparent;
      font-weight:600;
    }


    body.sidebar-collapsed .sidebar{
      width:var(--sidebar-collapsed-width);
    }

    body.sidebar-collapsed .main{
      margin-left:var(--sidebar-collapsed-width);
    }

    body.sidebar-collapsed .topbar{
      left:var(--sidebar-collapsed-width);
    }

    body.sidebar-collapsed .content{
      left:var(--sidebar-collapsed-width);
    }

    body.sidebar-collapsed .logo{
      padding:0 16px;
      justify-content:center;
    }

    body.sidebar-collapsed .logo-text,
    body.sidebar-collapsed .menu-label,
    body.sidebar-collapsed .arrow,
    body.sidebar-collapsed .submenu,
    body.sidebar-collapsed .collapse-text{
      display:none !important;
    }

    body.sidebar-collapsed .menu-group-title,
    body.sidebar-collapsed .collapse-btn{
      justify-content:center;
      padding-left:0;
      padding-right:0;
    }

    body.sidebar-collapsed .menu-group{
      margin-bottom:6px;
    }

    body.sidebar-collapsed .menu-icon,
    body.sidebar-collapsed .collapse-icon{
      margin:0;
    }


    @media(max-width:1280px){
      .filter-grid,.summary-row,.detail-grid,.config-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .tree-layout{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">B</div>
    <span class="logo-text">B2B ERP</span>
  </div>

  <nav class="menu">
    <div class="menu-group-title active" data-page="dashboard" title="首页工作台" onclick="openPage('dashboard')">
      <span class="menu-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="4" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="8" rx="1.5"/><rect x="3" y="14" width="7" height="6" rx="1.5"/></svg></span><span class="menu-label">首页工作台</span>
    </div>

    <div class="menu-group">
      <div class="menu-group-title" data-group="product" title="商品管理" onclick="toggleGroup('product')">
        <span class="menu-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 20 7.5 12 12 4 7.5 12 3Z"/><path d="M20 7.5V16.5L12 21"/><path d="M4 7.5V16.5L12 21"/><path d="M12 12V21"/></svg></span><span class="menu-label">商品管理</span><span class="arrow">▸</span>
      </div>
      <div class="submenu" id="group-product">
        <div class="submenu-item" data-page="product-list" onclick="openPage('product-list')">商品档案</div>
        <div class="submenu-item" data-page="product-category" onclick="openPage('product-category')">商品分类</div>
        <div class="submenu-item" data-page="product-brand" onclick="openPage('product-brand')">商品品牌</div>
      </div>
    </div>

    <div class="menu-group">
      <div class="menu-group-title" data-group="purchase" title="采购管理" onclick="toggleGroup('purchase')">
        <span class="menu-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4.5h6"/><path d="M9 10h6"/><path d="M9 14h6"/><path d="M9 18h4"/></svg></span><span class="menu-label">采购管理</span><span class="arrow">▸</span>
      </div>
      <div class="submenu" id="group-purchase">
        <div class="submenu-item" data-page="supplier" onclick="openPage('supplier')">供应商管理</div>
        <div class="submenu-item" data-page="purchase-order" onclick="openPage('purchase-order')">采购订单</div>
        <div class="submenu-item" data-page="purchase-inbound" onclick="openPage('purchase-inbound')">采购入库记录</div>
      </div>
    </div>

    <div class="menu-group">
      <div class="menu-group-title" data-group="stock" title="库存管理" onclick="toggleGroup('stock')">
        <span class="menu-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 6l9 4.5-9 4.5-9-4.5Z"/><path d="M3 10.5V17l9 4 9-4v-6.5"/><path d="M12 15v6"/></svg></span><span class="menu-label">库存管理</span><span class="arrow">▸</span>
      </div>
      <div class="submenu" id="group-stock">

  function showToast(text){
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 1800);
  }

  function toggleSidebar(forceExpand = false){
    const body = document.body;
    if(forceExpand === true){
      body.classList.remove('sidebar-collapsed');
    }else{
      body.classList.toggle('sidebar-collapsed');
    }
    updateCollapseBtn();
  }

  function updateCollapseBtn(){
    const collapsed = document.body.classList.contains('sidebar-collapsed');
    const icon = document.getElementById('collapseIcon');
    const text = document.getElementById('collapseText');
    if(icon) icon.textContent = collapsed ? '⟩' : '⟨';
    if(text) text.textContent = collapsed ? '展开' : '收起';
  }

  function updateGroupArrows(){
    document.querySelectorAll('.menu-group-title[data-group]').forEach(title => {
      const groupName = title.getAttribute('data-group');
      const submenu = document.getElementById('group-' + groupName);
      const arrow = title.querySelector('.arrow');
      if(arrow){
        arrow.textContent = submenu && submenu.classList.contains('open') ? '▾' : '▸';
      }
    });
  }

  function closeAllGroups(){
    document.querySelectorAll('.submenu').forEach(s => s.classList.remove('open'));
  }

  function toggleGroup(name){
    if(document.body.classList.contains('sidebar-collapsed')){
      toggleSidebar(true);
    }
    const group = document.getElementById('group-' + name);
    const willOpen = !group.classList.contains('open');
    closeAllGroups();
    if(willOpen){
      group.classList.add('open');
    }
    document.querySelectorAll('.menu-group-title[data-group]').forEach(i => i.classList.remove('active'));
    const title = document.querySelector('.menu-group-title[data-group="' + name + '"]');
    if(title) title.classList.add('active');
    updateGroupArrows();
  }

  function setActive(page){
    document.querySelectorAll('.menu-group-title,.submenu-item').forEach(i => i.classList.remove('active'));
    closeAllGroups();

    const current = document.querySelector('[data-page="' + page + '"]');
    if(current) current.classList.add('active');

    const parentGroup = current ? current.closest('.menu-group') : null;
    if(parentGroup){
      const title = parentGroup.querySelector('.menu-group-title');
      const submenu = parentGroup.querySelector('.submenu');
      if(title) title.classList.add('active');
      if(submenu) submenu.classList.add('open');
    }
    updateGroupArrows();
  }

  function openPage(page){
    const meta = pageMeta[page] || ['后台管理系统','页面'];
    const moduleCrumb = document.getElementById('moduleCrumb');
    const pageCrumb = document.getElementById('pageCrumb');
    const sep2 = document.getElementById('crumbSep2');

    const isTopLevel = meta[0] === meta[1];

    if(isTopLevel){
      moduleCrumb.style.display = 'none';
      sep2.style.display = 'none';
      pageCrumb.textContent = meta[0];
    }else{
      moduleCrumb.style.display = '';
      sep2.style.display = '';
      moduleCrumb.textContent = meta[0];
      pageCrumb.textContent = meta[1];
    }

    setActive(page);
    document.getElementById('content').innerHTML = renderPage(page);
  }

  function pageHeader(title, desc, actions=''){
    return `
      <div class="page-header">
        <div>
          <h1 class="page-title">${title}</h1>
          <p class="page-desc">${desc}</p>
        </div>
        <div style="display:flex;gap:8px">${actions}</div>
      </div>
    `;
  }

  function filters(fields){
    return `
      <div class="card filter-card">
        <div class="filter-grid">
          ${fields.map(f => `
            <div class="field">
              <label>${f.label}</label>
              ${f.type === 'select' ? `<select class="select">${f.options.map(o=>`<option>${o}</option>`).join('')}</select>` : `<input class="input" placeholder="${f.placeholder || ''}">`}
            </div>
          `).join('')}
          <div class="field">
            <label>&nbsp;</label>
            <div class="filter-actions">
              <button class="btn btn-primary" onclick="showToast('已查询')">查询</button>
              <button class="btn" onclick="showToast('已重置')">重置</button>

          </div>
        </div>
      </div>
    `;
  }

  function activateTab(tab){
    const tabsWrap = tab.closest('.tabs');
    if(!tabsWrap) return;

    tabsWrap.querySelectorAll('.tab').forEach(item => item.classList.remove('active'));
    tab.classList.add('active');

    const text = tab.textContent.trim().replace(/\s+/g, ' ');
    syncTabView(text);
  }

    return `

        </div>
        <table>
          <thead><tr>${headers.map((h,idx)=>`<th ${h === '操作' ? 'style="width:220px"' : ''}>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>${r.map((c,idx)=>`<td>${headers[idx] === '操作' ? formatActions(c) : formatCell(c)}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>

    `;

  function formatCell(value){
    const text = String(value);
    if(['启用','已上架','已完成','已开票','支付成功','退款成功','正常','成功'].includes(text)) return `<span class="tag tag-green">${text}</span>`;
    if(['停用','禁用','已下架','已取消'].includes(text)) return `<span class="tag tag-gray">${text}</span>`;
    if(['待入库','待发货','待开票','待审核'].includes(text)) return `<span class="tag tag-blue">${text}</span>`;
    if(['部分入库','部分发货','退货退款','电子专票'].includes(text)) return `<span class="tag tag-purple">${text}</span>`;
    if(['预警','退款中'].includes(text) || text.includes('预警')) return `<span class="tag tag-orange">${text}</span>`;
    if(['缺货','已驳回','已拒绝','支付失败'].includes(text) || text.includes('缺货')) return `<span class="tag tag-red">${text}</span>`;
    if(['仅退款','电子普票'].includes(text)) return `<span class="tag tag-blue">${text}</span>`;
    return text;
  }
  function formatActions(value){
    const text = String(value || '');
    return text.split('/').map(s => s.trim()).filter(Boolean).map(action => {
      if(action.startsWith('去处理:')){
        const page = action.split(':')[1] || '';
        return `<button class="btn-text" onclick="goToPage('${page}')">去处理</button>`;
      }
      const danger = ['删除','停用','禁用','取消','驳回'].some(k => action.includes(k));
      return `<button class="${danger ? 'btn-text-danger' : 'btn-text'}" onclick="handleAction('${encodeURIComponent(action)}')">${action}</button>`;
    }).join(' ');
  }

  function goToPage(page){
    if(page){
      openPage(page);
      showToast('已跳转到对应功能页面');
    }
  }


  function currentPageName(){
    return document.getElementById('pageCrumb').textContent || '';
  }

  function handleAction(encodedAction){
    const action = decodeURIComponent(encodedAction);
    const page = currentPageName();

    if(action.includes('详情')) return openDetailByPage(page);
    if(action.includes('编辑')) return openEditByPage(page);
    if(action.includes('新增')) return openCreateByPage(page);

    if(action.includes('配置权限')) return openPermissionActionDrawer();
    if(action.includes('重置密码')) return openResetPwdDrawer('admin');
    if(action.includes('采购入库') || action.includes('继续入库')) return openPurchaseInboundActionDrawer();
    if(action.includes('流水')) return openStockFlowActionDrawer();
    if(action.includes('调整')) return openStockAdjustActionDrawer();
    if(action.includes('预警')) return openStockWarningActionDrawer();
    if(action.includes('发货记录')) return openShipmentRecordDrawer();
    if(action.includes('发货') || action.includes('继续发货')) return openShipmentActionDrawer();
    if(action.includes('审核')) return openAftersaleAuditDrawer();
    if(action.includes('确认收货')) return openReturnReceiveDrawer();
    if(action.includes('处理退款')) return openRefundActionDrawer();
    if(action.includes('上传发票')) return openInvoiceUploadDrawer();
    if(action.includes('查看发票')) return openInvoiceFileDrawer();
    if(action.includes('上架')) return openConfirmDrawer('上架确认','确认上架该商品吗？上架后商城端可展示并购买。','确认上架','商品已上架');
    if(action.includes('下架')) return openConfirmDrawer('下架确认','确认下架该商品吗？下架后商城端不再展示，历史订单不受影响。','确认下架','商品已下架');
    if(action.includes('启用')) return openConfirmDrawer('启用确认','确认启用该数据吗？启用后可在业务流程中继续使用。','确认启用','已启用');
    if(action.includes('禁用')) return openConfirmDrawer('禁用确认','确认禁用该数据吗？禁用后将不可继续使用，历史业务数据不受影响。','确认禁用','已禁用', true);
    if(action.includes('停用')) return openConfirmDrawer('停用确认','确认停用该数据吗？停用后新业务不可选择，历史业务数据不受影响。','确认停用','已停用', true);
    if(action.includes('删除')) return openConfirmDrawer('删除确认','确认删除该数据吗？仅未产生业务数据的记录允许删除。','确认删除','已删除', true);
    if(action.includes('取消')) return openConfirmDrawer('取消确认','确认取消该单据吗？取消后不可继续处理。','确认取消','已取消', true);
    if(action.includes('驳回')) return openRejectActionDrawer();

    openFormDrawer(action, '当前操作：' + action);
  }

    document.getElementById('drawerBody').innerHTML = `
      <div class="notice"><span>⚠️</span><div>账号 <b>${account}</b> 重置密码后，将使用新密码登录后台。</div></div>
      <div class="form-grid">
        <div class="label">登录账号</div><input class="input" value="${account}" readonly>
        <div class="label required">新密码</div><input class="input" type="password" placeholder="请输入新密码">
        <div class="label required">确认新密码</div><input class="input" type="password" placeholder="请再次输入新密码">
      </div>
      <div style="color:var(--text-help);font-size:12px;margin-top:12px;padding-left:134px">密码长度6-20位，可以纯数字。</div>
    `;
    document.getElementById('drawerFooter').innerHTML = `
      <button class="btn" onclick="closeDrawer()">取消</button>
      <button class="btn btn-primary" onclick="closeDrawer();showToast('密码已重置')">确认重置</button>
    `;
    document.getElementById('drawerMask').style.display = 'flex';
  }

  function toggleAdminStatus(account,targetStatus){
    setDrawerSize();
    document.getElementById('drawerTitle').textContent = targetStatus === '禁用' ? '禁用后台账号' : '启用后台账号';
    document.getElementById('drawerBody').innerHTML = `
      <div class="notice"><span>${targetStatus === '禁用' ? '⚠️' : 'ℹ️'}</span><div>确认${targetStatus}账号 <b>${account}</b> 吗？${targetStatus === '禁用' ? '禁用后该账号将无法登录后台。' : '启用后该账号可恢复登录后台。'}</div></div>
      <div class="mini-card">
        <div class="detail-grid">
          <div><div class="detail-label">登录账号</div><div class="detail-val">${account}</div></div>
          <div><div class="detail-label">目标状态</div><div class="detail-val">${targetStatus}</div></div>
        </div>
      </div>
    `;
    document.getElementById('drawerFooter').innerHTML = `
      <button class="btn" onclick="closeDrawer()">取消</button>
      <button class="btn ${targetStatus === '禁用' ? 'btn-danger' : 'btn-primary'}" onclick="closeDrawer();showToast('账号状态已更新')">确认${targetStatus}</button>
    `;
    document.getElementById('drawerMask').style.display = 'flex';
  }

  function openGenericDrawer(title){
    openFormDrawer(title,'这里跳转到对应独立原型页面或打开新增/编辑抽屉。');
  }

  function openFormDrawer(title, text){
    setDrawerSize(title.includes('商品') || title.includes('采购订单') ? 'wide' : 'normal');
    document.getElementById('drawerTitle').textContent = title;

    const bodyMap = {
      '新增商品': productFormHtml(),
      '编辑商品': productFormHtml(true),
      '新增一级分类': categoryFormHtml('新增一级分类'),
      '新增子分类': categoryFormHtml('新增子分类'),
      '编辑分类': categoryFormHtml('编辑分类'),
      '新增品牌': brandFormHtml(),
      '编辑品牌': brandFormHtml(true),
      '新增供应商': supplierFormHtml(),
      '编辑供应商': supplierFormHtml(true),
      '新增采购订单': purchaseOrderFormHtml(),
      '编辑采购订单': purchaseOrderFormHtml(true),
      '库存调整': stockAdjustFormHtml(),
      '新增库存调整': stockAdjustFormHtml(),
      '设置库存预警值': stockWarningFormHtml(),
      '新增角色': roleFormHtml(),
      '编辑角色': roleFormHtml(true)
    };

    document.getElementById('drawerBody').innerHTML = bodyMap[title] || `
      <div class="section-title">${title}</div>
      <div class="form-grid">
        <div class="label required">名称</div><input class="input" placeholder="请输入名称">
        <div class="label">状态</div><select class="select"><option>启用</option><option>停用</option></select>
        <div class="label">备注</div><textarea class="textarea" placeholder="请输入备注">${text || ''}</textarea>
      </div>
    `;
    document.getElementById('drawerFooter').innerHTML = `
      <button class="btn" onclick="closeDrawer()">取消</button>
      <button class="btn btn-primary" onclick="closeDrawer();showToast('保存成功')">保存</button>
    `;
    document.getElementById('drawerMask').style.display = 'flex';
  }

  function productFormHtml(edit=false){
    return `
      <div class="notice"><span>ℹ️</span><div>商品保存并上架前，必须填写商品名称、商品分类、商品主图、至少一个启用SKU，并完成报价配置。</div></div>
      <div class="section-title">基础信息</div>
      <div class="form-grid">
        <div class="label required">商品名称</div><input class="input" value="${edit ? '农夫山泉饮用天然水' : ''}" placeholder="请输入商品名称">
        <div class="label required">商品编码</div><input class="input" value="${edit ? 'SPU-NS-001' : ''}" placeholder="请输入商品编码">
        <div class="label required">商品分类</div><select class="select"><option>包装饮用水</option><option>茶饮料</option><option>休闲零食</option></select>
        <div class="label">商品品牌</div><select class="select"><option>农夫山泉</option><option>娃哈哈</option><option>康师傅</option></select>
        <div class="label required">商品单位</div><input class="input" value="箱">
        <div class="label">商品状态</div><select class="select"><option>草稿</option><option>已上架</option><option>已下架</option></select>
      </div>
      <div class="section-title">规格/SKU</div>
      ${miniTable(['规格','SKU编码','启用状态','操作'],[
        ['550ml/24瓶','SKU-NS-550-24','启用','编辑 / 禁用'],
        ['1.5L/12瓶','SKU-NS-1500-12','启用','编辑 / 禁用']
      ])}
      <div class="section-title">报价方式</div>
      <div class="mini-card">报价方式：阶梯报价 / 规格独立报价；阶梯报价时不需要给每个规格配置价格。</div>
    `;
  }

  function categoryFormHtml(title){
    return `<div class="form-grid">
      <div class="label required">分类名称</div><input class="input" value="${title === '编辑分类' ? '包装饮用水' : ''}" placeholder="请输入分类名称">
      <div class="label">上级分类</div><select class="select"><option>无</option><option>饮料水饮</option><option>食品</option></select>
      <div class="label required">排序值</div><input class="input" value="1">
      <div class="label required">状态</div><select class="select"><option>启用</option><option>停用</option></select>
      <div class="label">分类说明</div><textarea class="textarea" placeholder="请输入分类说明"></textarea>
    </div>`;
  }

  function brandFormHtml(edit=false){
    return `<div class="form-grid">
      <div class="label required">品牌名称</div><input class="input" value="${edit ? '农夫山泉' : ''}" placeholder="请输入品牌名称">
      <div class="label">品牌首字母</div><input class="input" value="${edit ? 'N' : ''}" placeholder="请输入首字母">
      <div class="label">品牌LOGO</div><button class="btn">上传LOGO</button>
      <div class="label required">排序值</div><input class="input" value="1">
      <div class="label required">状态</div><select class="select"><option>启用</option><option>停用</option></select>
    </div>`;
  }

  function supplierFormHtml(edit=false){
    return `<div class="form-grid">
      <div class="label required">供应商名称</div><input class="input" value="${edit ? '杭州水饮供应链有限公司' : ''}" placeholder="请输入供应商名称">
      <div class="label required">联系人</div><input class="input" value="${edit ? '张经理' : ''}" placeholder="请输入联系人">
      <div class="label required">联系电话</div><input class="input" value="${edit ? '13888888888' : ''}" placeholder="请输入联系电话">
      <div class="label">联系地址</div><input class="input" value="${edit ? '浙江省杭州市西湖区' : ''}" placeholder="请输入联系地址">
      <div class="label required">状态</div><select class="select"><option>启用</option><option>停用</option></select>
      <div class="label">备注</div><textarea class="textarea" placeholder="请输入备注"></textarea>
    </div>`;
  }

  function purchaseOrderFormHtml(edit=false){
    return `
      <div class="section-title">采购基础信息</div>
      <div class="form-grid">
        <div class="label required">供应商</div><select class="select"><option>杭州水饮供应链有限公司</option><option>上海食品批发有限公司</option></select>
        <div class="label required">预计到货时间</div><input class="input" value="2026-06-10">
        <div class="label">采购备注</div><textarea class="textarea">按批次入库。</textarea>
      </div>
      <div class="section-title">采购商品明细</div>
      ${miniTable(['商品/SKU','SKU编码','采购数量','采购单价','小计','操作'],[
        ['农夫山泉 550ml/24瓶','SKU-NS-550-24','100','¥28.00','¥2,800.00','删除'],
        ['娃哈哈 596ml/24瓶','SKU-WH-596-24','120','¥26.00','¥3,120.00','删除']
      ])}
      <div style="margin-top:12px"><button class="btn btn-primary">添加采购商品</button></div>
    `;
  }

  function stockAdjustFormHtml(){
    return `<div class="notice"><span>⚠️</span><div>库存调整只影响实际库存和可售库存，不影响冻结库存。调减数量不能大于当前可售库存。</div></div>
      <div class="form-grid">
        <div class="label required">选择SKU</div><select class="select"><option>农夫山泉｜550ml/24瓶</option><option>娃哈哈｜596ml/24瓶</option></select>
        <div class="label required">调整方式</div><select class="select"><option>调增</option><option>调减</option></select>
        <div class="label required">调整数量</div><input class="input" value="10">
        <div class="label required">调整原因</div><select class="select"><option>盘点差异</option><option>破损报废</option><option>人工修正</option></select>
        <div class="label">备注</div><textarea class="textarea">仓库盘点差异。</textarea>
      </div>`;
  }

  function stockWarningFormHtml(){
    return `<div class="form-grid">
      <div class="label">SKU</div><input class="input" value="SKU-NS-550-24" readonly>
      <div class="label">当前可售库存</div><input class="input" value="68" readonly>
      <div class="label required">库存预警值</div><input class="input" value="20">
      <div class="label">说明</div><textarea class="textarea" readonly>当可售库存大于0且小于等于预警值时，显示为预警；可售库存小于等于0时，显示为缺货。</textarea>
    </div>`;
  }

  function roleFormHtml(edit=false){
    return `<div class="form-grid">
      <div class="label required">角色名称</div><input class="input" value="${edit ? '仓库人员' : ''}" placeholder="请输入角色名称">
      <div class="label required">状态</div><select class="select"><option>启用</option><option>禁用</option></select>
      <div class="label">角色说明</div><textarea class="textarea" placeholder="请输入角色说明">${edit ? '负责库存、采购入库、订单发货。' : ''}</textarea>
    </div>
    <div class="section-title">权限配置</div>${permissionBlock()}`;
  }

  function closeDrawer(){
    document.getElementById('drawerMask').style.display = 'none';
    document.getElementById('drawerFooter').innerHTML = '<button class="btn" onclick="closeDrawer()">关闭</button>';
    setDrawerSize();
  }

  document.getElementById('drawerMask').addEventListener('click', e => {
    if(e.target.id === 'drawerMask') closeDrawer();
  });

  updateCollapseBtn();
  openPage('dashboard');
</script>
<script src="admin-api-adapter.js?v=20260608-no-api-notices"></script>
</body>
</html>
