<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B2B ERP 一期系统</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f5f8;
        color: #172033;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }
      button, input, select, textarea { font: inherit; }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 248px minmax(0, 1fr);
      }
      .sidebar {
        background: #111827;
        color: #fff;
        padding: 22px 18px;
      }
      .brand {
        font-size: 20px;
        font-weight: 800;
      }
      .brand-sub {
        margin-top: 8px;
        color: #a8b1c1;
        line-height: 1.5;
        font-size: 13px;
      }
      .channel-tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-top: 24px;
      }
      .channel-tabs button, .nav button, .btn, .icon-btn {
        border: 0;
        cursor: pointer;
      }
      .channel-tabs button {
        height: 34px;
        border-radius: 6px;
        background: #243044;
        color: #cbd5e1;
        font-size: 13px;
      }
      .channel-tabs button.active {
        background: #2563eb;
        color: #fff;
      }
      .nav {
        display: grid;
        gap: 7px;
        margin-top: 18px;
      }
      .nav button {
        height: 42px;
        border-radius: 6px;
        padding: 0 14px;
        background: transparent;
        color: #d1d5db;
        text-align: left;
      }
      .nav button.active {
        background: #2563eb;
        color: #fff;
      }
      .content {
        min-width: 0;
        padding: 26px 28px 36px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.25;
      }
      .muted { color: #65738a; }
      .status {
        min-width: 118px;
        height: 38px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #bae6c9;
        background: #eefcf3;
        color: #16723b;
        font-weight: 700;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }
      .metric, .panel, .table-wrap, .phone-shell {
        background: #fff;
        border: 1px solid #dfe6f0;
        border-radius: 8px;
      }
      .metric {
        padding: 18px 18px 16px;
      }
      .metric-label {
        color: #65738a;
        font-size: 13px;
      }
      .metric-value {
        margin-top: 10px;
        font-size: 30px;
        font-weight: 800;
      }
      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.6fr) minmax(320px, .8fr);
        gap: 16px;
        align-items: start;
      }
      .panel {
        padding: 18px;
      }
      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      h2 {
        margin: 0;
        font-size: 18px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .btn {
        min-height: 36px;
        border-radius: 6px;
        padding: 0 13px;
        background: #111827;
        color: #fff;
      }
      .btn.secondary {
        background: #e8edf5;
        color: #172033;
      }
      .btn.good {
        background: #15803d;
      }
      .btn.warn {
        background: #b45309;
      }
      .btn.danger {
        background: #b91c1c;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .field {
        display: grid;
        gap: 5px;
      }
      .field label {
        color: #52627a;
        font-size: 13px;
      }
      input, select, textarea {
        width: 100%;
        border: 1px solid #d4dce8;
        border-radius: 6px;
        background: #fff;
        padding: 9px 10px;
        color: #172033;
      }
      textarea { min-height: 74px; resize: vertical; }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }
      th, td {
        border-bottom: 1px solid #edf1f6;
        padding: 12px 13px;
        text-align: left;
        vertical-align: middle;
        font-size: 14px;
      }
      th {
        background: #f7f9fc;
        color: #52627a;
        font-weight: 700;
      }
      .table-wrap {
        overflow: auto;
      }
      .tag {
        display: inline-flex;
        min-height: 24px;
        align-items: center;
        border-radius: 999px;
        padding: 0 9px;
        background: #edf2f7;
        color: #475569;
        font-size: 12px;
        white-space: nowrap;
      }
      .tag.green { background: #e8f7ee; color: #176b39; }
      .tag.blue { background: #eaf2ff; color: #1d4ed8; }
      .tag.orange { background: #fff4e5; color: #a15c00; }
      .tag.red { background: #feecec; color: #b91c1c; }
      .flow {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }
      .flow div {
        background: #fff;
        border: 1px solid #dfe6f0;
        border-radius: 8px;
        padding: 12px;
        min-height: 64px;
      }
      .mall-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
      .product-tile {
        border: 1px solid #dfe6f0;
        border-radius: 8px;
        padding: 14px;
        background: #fff;
      }
      .product-image {
        height: 96px;
        border-radius: 6px;
        background: linear-gradient(135deg, #f8fafc, #dbeafe);
        border: 1px solid #dbe4ef;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #31517d;
        font-weight: 800;
      }
      .price {
        color: #b91c1c;
        font-size: 20px;
        font-weight: 800;
      }
      .phone-shell {
        width: min(390px, 100%);
        margin: 0 auto;
        padding: 14px;
        background: #111827;
      }
      .phone-screen {
        min-height: 650px;
        border-radius: 6px;
        background: #f8fafc;
        overflow: hidden;
      }
      .phone-header {
        background: #2563eb;
        color: #fff;
        padding: 14px 16px;
        font-weight: 800;
      }
      .phone-body {
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      .notice {
        border-left: 4px solid #2563eb;
        background: #eef5ff;
        padding: 12px 14px;
        color: #24446f;
        border-radius: 6px;
      }
      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        min-width: 240px;
        max-width: 420px;
        padding: 13px 15px;
        border-radius: 8px;
        background: #111827;
        color: #fff;
        box-shadow: 0 14px 30px rgba(15, 23, 42, .2);
        display: none;
      }
      .toast.show { display: block; }
      @media (max-width: 1100px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { position: static; }
        .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .workspace { grid-template-columns: 1fr; }
        .mall-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 680px) {
        .content { padding: 18px 14px 28px; }
        .metrics, .mall-grid, .flow, .form-grid { grid-template-columns: 1fr; }
        .topbar { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">B2B ERP 一期系统</div>
        <div class="brand-sub">后台管理 / 网页商城 / 小程序商城<br />单卖家自营交易闭环</div>
        <div class="channel-tabs" id="channelTabs"></div>
        <nav class="nav" id="nav"></nav>
      </aside>
      <main class="content">
        <div class="topbar">
          <div>
            <h1 id="pageTitle">一期交易闭环</h1>
            <div class="muted" id="pageDesc">商品、采购、库存、订单、支付、发货、售后、开票。</div>
          </div>
          <div class="status" id="apiStatus">检查中</div>
        </div>
        <section id="root"></section>
      </main>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      const defaultPath = location.pathname.toLowerCase();
      const defaultChannel = defaultPath.includes("mini") ? "mini" : defaultPath.includes("mall") ? "mall" : "admin";
      const defaultPage = defaultChannel === "mini" ? "miniHome" : defaultChannel === "mall" ? "mallHome" : "dashboard";
      const state = {
        channel: defaultChannel,
        page: defaultPage,
        health: null,
        summary: {},
        products: [],
        suppliers: [],
        purchases: [],
        inventory: [],
        flows: [],
        orders: [],
        afterSales: [],
        invoices: [],
        payments: [],
        refunds: [],
        accounts: [],
        roles: [],
        permissions: [],
        parameters: {},
        cart: null,
        profile: null
      };

      const channels = {
        admin: {
          label: "后台",
          pages: [
            ["dashboard", "首页工作台"],
            ["products", "商品管理"],
            ["purchase", "采购管理"],
            ["inventory", "库存管理"],
            ["orders", "订单发货"],
            ["afterSales", "售后管理"],
            ["invoices", "开票管理"],
            ["finance", "财务管理"],
            ["system", "系统权限"]
          ]
        },
        mall: {
          label: "网页商城",
          pages: [
            ["mallHome", "商城首页"],
            ["mallOrders", "我的订单"],
            ["mallInvoices", "发票中心"]
          ]
        },
        mini: {
          label: "小程序",
          pages: [
            ["miniHome", "小程序首页"],
            ["miniOrders", "订单/售后"],
            ["miniInvoice", "移动开票"]
          ]
        }
      };

      const labelMap = {
        ON_SALE: "已上架",
        OFF_SALE: "已下架",
        WAIT_PAY: "待支付",
        WAIT_SHIP: "待发货",
        WAIT_RECEIVE: "待收货",
        COMPLETED: "已完成",
        PAID: "已支付",
        UNPAID: "未支付",
        UNSHIPPED: "未发货",
        SHIPPED: "已发货",
        RECEIVED: "已收货",
        WAIT_STOCK_IN: "待入库",
        PART_STOCK_IN: "部分入库",
        WAIT_AUDIT: "待审核",
        WAIT_REFUND: "待退款",
        WAIT_RETURN_RECEIVE: "待卖家收货",
        WAIT_INVOICE: "待开票",
        INVOICED: "已开票",
        REJECTED: "已驳回",
        PURCHASE_STOCK_IN: "采购入库",
        ORDER_DEDUCT: "销售出库",
        MANUAL_ADJUST: "库存调整"
      };

      const pageMeta = {
        dashboard: ["后台首页工作台", "交付包后台原型菜单：采购、库存、订单、售后、开票、财务、系统。"],
        products: ["商品管理", "多规格商品维护，上架后同步到商城端。"],
        purchase: ["采购管理", "供应商、采购订单、采购入库；入库会真实增加库存并生成库存流水。"],
        inventory: ["库存管理", "SKU 维度单仓库存，展示可售库存、预警状态与流水。"],
        orders: ["订单发货", "后台处理支付确认、发货、确认收货等订单状态流转。"],
        afterSales: ["售后管理", "处理仅退款、退货退款、审核和退款动作。"],
        invoices: ["开票管理", "处理电子普票、电子专票申请，支持确认开票和驳回。"],
        finance: ["财务管理", "查看支付记录、退款记录和异常流转。"],
        system: ["系统权限", "后台账号、角色权限、基础业务参数。"],
        mallHome: ["网页商城", "买家浏览商品、购物车、提交采购订单。"],
        mallOrders: ["我的订单", "买家查看订单并确认收货。"],
        mallInvoices: ["发票中心", "维护抬头并提交开票申请。"],
        miniHome: ["小程序商城", "移动端商品浏览和快速采购。"],
        miniOrders: ["移动订单/售后", "小程序订单状态、售后申请入口。"],
        miniInvoice: ["移动开票", "小程序提交发票申请。"]
      };

      function byId(id) { return document.getElementById(id); }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options
        });
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(data?.message || `${path} HTTP ${response.status}`);
        }
        return data;
      }

      async function post(path, payload = {}) {
        return api(path, { method: "POST", body: JSON.stringify(payload) });
      }

      async function put(path, payload = {}) {
        return api(path, { method: "PUT", body: JSON.stringify(payload) });
      }

      function toast(message) {
        const node = byId("toast");
        node.textContent = message;
        node.classList.add("show");
        window.setTimeout(() => node.classList.remove("show"), 2600);
      }

      async function refreshData() {
        const tasks = [
          api("/api/health").then(data => state.health = data),
          api("/api/admin/summary").then(data => state.summary = data),
          api("/api/admin/products").then(data => state.products = data),
          api("/api/admin/suppliers").then(data => state.suppliers = data),
          api("/api/admin/purchase-orders").then(data => state.purchases = data),
          api("/api/admin/inventory").then(data => state.inventory = data),
          api("/api/admin/inventory/flows").then(data => state.flows = data),
          api("/api/admin/orders").then(data => state.orders = data),
          api("/api/admin/after-sales").then(data => state.afterSales = data),
          api("/api/admin/invoices").then(data => state.invoices = data),
          api("/api/admin/finance/payments").then(data => state.payments = data),
          api("/api/admin/finance/refunds").then(data => state.refunds = data),
          api("/api/admin/accounts").then(data => state.accounts = data),
          api("/api/admin/roles").then(data => state.roles = data),
          api("/api/admin/permissions/tree").then(data => state.permissions = data),
          api("/api/system/parameters").then(data => state.parameters = data),
          api("/api/mall/cart").then(data => state.cart = data),
          api("/api/buyer/profile").then(data => state.profile = data)
        ];
        try {
          await Promise.all(tasks);
          byId("apiStatus").textContent = "API 正常";
        } catch (error) {
          byId("apiStatus").textContent = "API 异常";
          toast(error.message);
        }
      }

      function renderShell() {
        byId("channelTabs").innerHTML = Object.entries(channels).map(([key, item]) => `
          <button class="${state.channel === key ? "active" : ""}" onclick="switchChannel('${key}')">${item.label}</button>
        `).join("");
        byId("nav").innerHTML = channels[state.channel].pages.map(([key, label]) => `
          <button class="${state.page === key ? "active" : ""}" onclick="openPage('${key}')">${label}</button>
        `).join("");
        const [title, desc] = pageMeta[state.page];
        byId("pageTitle").textContent = title;
        byId("pageDesc").textContent = desc;
      }

      function switchChannel(channel) {
        state.channel = channel;
        state.page = channels[channel].pages[0][0];
        render();
      }

      function openPage(page) {
        state.page = page;
        render();
      }

      function money(value) {
        return `¥${Number(value || 0).toFixed(2)}`;
      }

      function label(value) {
        return labelMap[value] || value || "-";
      }

      function tag(value) {
        const text = label(value);
        const green = ["已上架", "已支付", "已完成", "已开票", "正常", "退款成功"].includes(text);
        const blue = ["待发货", "待入库", "待审核", "待开票", "待收货"].includes(text);
        const red = ["已下架", "已驳回", "库存预警"].includes(text);
        return `<span class="tag ${green ? "green" : blue ? "blue" : red ? "red" : "orange"}">${text}</span>`;
      }

      function table(headers, rows) {
        return `<div class="table-wrap"><table><thead><tr>${headers.map(item => `<th>${item}</th>`).join("")}</tr></thead><tbody>${rows.join("") || `<tr><td colspan="${headers.length}">暂无数据</td></tr>`}</tbody></table></div>`;
      }

      function metrics() {
        const items = [
          ["今日订单", state.summary.todayOrders || 0],
          ["可售 SKU", state.summary.saleableSkus || 0],
          ["库存预警", state.summary.stockWarning || 0],
          ["待处理售后", state.summary.pendingAfterSale || 0],
          ["待开票", state.summary.pendingInvoice || 0]
        ];
        return `<div class="metrics">${items.map(([labelText, value]) => `<div class="metric"><div class="metric-label">${labelText}</div><div class="metric-value">${value}</div></div>`).join("")}</div>`;
      }

      function renderDashboard() {
        return `${metrics()}
          <div class="flow">
            ${["商品维护", "采购入库", "买家下单", "支付发货", "售后开票"].map(text => `<div><strong>${text}</strong><p class="muted">一期核心链路</p></div>`).join("")}
          </div>
          <div class="workspace">
            <div class="panel">
              <div class="panel-head"><h2>待办任务</h2><button class="btn secondary" onclick="loadAndRender()">刷新</button></div>
              ${table(["模块", "任务", "数量", "入口"], (state.summary.todoCards || []).map(item => `
                <tr><td>${item.module}</td><td>${item.title}</td><td>${item.count}</td><td><button class="btn secondary" onclick="openPage('${item.target}')">去处理</button></td></tr>
              `))}
            </div>
            <div class="panel">
              <h2>基础规则</h2>
              <p class="notice">支付超时 ${state.parameters.payTimeoutMinutes || 15} 分钟，发货后 ${state.parameters.autoConfirmReceiptDays || 10} 天自动确认收货，售后期 ${state.parameters.afterSaleDays || 7} 天，库存预警阈值 ${state.parameters.stockWarningThreshold || 50}。</p>
            </div>
          </div>`;
      }

      function renderProducts() {
        return `<div class="workspace">
          <div class="panel">
            <div class="panel-head"><h2>商品列表</h2><div class="toolbar"><button class="btn" onclick="quickCreateProduct()">新增商品</button></div></div>
            ${table(["商品编码", "商品", "SKU", "单位", "价格", "库存", "起订量", "状态", "操作"], state.products.map(product => `
              <tr>
                <td>${product.productCode}</td><td>${product.productName}</td><td>${product.skuName}<br><span class="muted">${product.skuCode}</span></td>
                <td>${product.unit}</td><td>${money(product.salePrice)}</td><td>${product.stockQuantity}</td><td>${product.minOrderQuantity}</td><td>${tag(product.saleStatus)}</td>
                <td><button class="btn secondary" onclick="toggleProduct(${product.id}, '${product.saleStatus}')">${product.saleStatus === "ON_SALE" ? "下架" : "上架"}</button></td>
              </tr>
            `))}
          </div>
          <div class="panel">
            <h2>交付包规则</h2>
            <p class="muted">一期支持多规格商品、规格独立报价和阶梯报价。当前演示以 SKU 独立报价落库，商城端只展示已上架商品。</p>
          </div>
        </div>`;
      }

      function renderPurchase() {
        return `<div class="workspace">
          <div class="panel">
            <div class="panel-head"><h2>采购订单</h2><button class="btn good" onclick="stockInFirst()">采购入库</button></div>
            ${table(["采购单号", "供应商", "SKU数", "采购数", "已入库", "金额", "预计到货", "状态", "操作"], state.purchases.map(item => `
              <tr><td>${item.purchaseNo}</td><td>${item.supplierName}</td><td>${item.skuCount}</td><td>${item.purchaseQty}</td><td>${item.stockedQty}</td><td>${money(item.amount)}</td><td>${item.expectedArrivalDate}</td><td>${tag(item.status)}</td><td><button class="btn secondary" onclick="stockIn(${item.id}, ${item.targetProductId})">入库100</button></td></tr>
            `))}
          </div>
          <div class="panel">
            <h2>供应商</h2>
            ${table(["编号", "供应商", "联系人", "电话", "采购单数", "状态"], state.suppliers.map(item => `
              <tr><td>${item.supplierNo}</td><td>${item.supplierName}</td><td>${item.contactName}</td><td>${item.phone}</td><td>${item.purchaseCount}</td><td>${tag(item.status)}</td></tr>
            `))}
          </div>
        </div>`;
      }

      function renderInventory() {
        return `<div class="workspace">
          <div class="panel">
            <div class="panel-head"><h2>库存总览</h2><button class="btn" onclick="adjustFirst()">库存调增</button></div>
            ${table(["商品", "SKU", "实际库存", "占用", "可售", "预警阈值", "状态"], state.inventory.map(item => `
              <tr><td>${item.productName}</td><td>${item.skuCode}</td><td>${item.actualStock}</td><td>${item.occupiedStock}</td><td>${item.saleableStock}</td><td>${item.warningThreshold}</td><td>${tag(item.inventoryStatus)}</td></tr>
            `))}
          </div>
          <div class="panel">
            <h2>库存流水</h2>
            ${table(["时间", "类型", "商品", "变动", "库存后", "来源"], state.flows.map(item => `
              <tr><td>${String(item.createdAt).replace("T", " ")}</td><td>${tag(item.movementType)}</td><td>${item.productName}<br><span class="muted">${item.skuCode}</span></td><td>${item.quantityDelta}</td><td>${item.stockAfter}</td><td>${item.sourceNo}</td></tr>
            `))}
          </div>
        </div>`;
      }

      function renderOrders() {
        return `<div class="panel">
          <div class="panel-head"><h2>后台订单列表</h2><button class="btn secondary" onclick="loadAndRender()">刷新</button></div>
          ${table(["订单号", "买家", "金额", "订单状态", "支付", "发货", "商品", "操作"], state.orders.map(order => `
            <tr>
              <td>${order.orderNo}</td><td>${order.customerName}</td><td>${money(order.totalAmount)}</td><td>${tag(order.orderStatus)}</td><td>${tag(order.paymentStatus)}</td><td>${tag(order.fulfillmentStatus)}</td>
              <td>${(order.items || []).map(item => `${item.productName} x ${item.quantity}`).join("<br>")}</td>
              <td><div class="toolbar">${orderButtons(order)}</div></td>
            </tr>
          `))}
        </div>`;
      }

      function orderButtons(order) {
        const buttons = [];
        if (["WAIT_PAY", "WAIT_CONFIRM"].includes(order.orderStatus)) buttons.push(`<button class="btn good" onclick="orderAction(${order.id}, 'pay')">确认支付</button>`);
        if (order.orderStatus === "WAIT_SHIP") buttons.push(`<button class="btn" onclick="orderAction(${order.id}, 'ship')">发货</button>`);
        if (order.orderStatus === "WAIT_RECEIVE") buttons.push(`<button class="btn secondary" onclick="orderAction(${order.id}, 'complete')">确认收货</button>`);
        return buttons.join("") || `<span class="muted">已处理</span>`;
      }

      function renderAfterSales() {
        return `<div class="panel">
          <div class="panel-head"><h2>售后申请</h2><button class="btn" onclick="createAfterSale()">新增售后</button></div>
          ${table(["售后单号", "订单", "买家", "类型", "商品", "数量", "退款金额", "状态", "操作"], state.afterSales.map(item => `
            <tr><td>${item.afterSaleNo}</td><td>${item.orderNo}</td><td>${item.buyerName}</td><td>${label(item.type)}</td><td>${item.productName || "-"}</td><td>${item.quantity || "-"}</td><td>${money(item.refundAmount)}</td><td>${tag(item.status)}</td><td><div class="toolbar"><button class="btn good" onclick="auditAfterSale(${item.id})">审核通过</button><button class="btn secondary" onclick="refundAfterSale(${item.id})">退款</button></div></td></tr>
          `))}
        </div>`;
      }

      function renderInvoices() {
        return `<div class="panel">
          <div class="panel-head"><h2>开票申请</h2><button class="btn" onclick="createInvoice()">新增开票</button></div>
          ${table(["申请单号", "订单", "买家", "发票类型", "抬头", "金额", "状态", "操作"], state.invoices.map(item => `
            <tr><td>${item.invoiceApplyNo}</td><td>${item.orderNo}</td><td>${item.buyerName}</td><td>${item.invoiceType}</td><td>${item.title}</td><td>${money(item.amount)}</td><td>${tag(item.status)}</td><td><div class="toolbar"><button class="btn good" onclick="confirmInvoice(${item.id})">确认开票</button><button class="btn danger" onclick="rejectInvoice(${item.id})">驳回</button></div></td></tr>
          `))}
        </div>`;
      }

      function renderFinance() {
        return `<div class="workspace">
          <div class="panel"><h2>支付记录</h2>${table(["支付流水", "订单", "买家", "方式", "金额", "状态", "时间"], state.payments.map(item => `
            <tr><td>${item.paymentNo}</td><td>${item.orderNo}</td><td>${item.buyerName}</td><td>${label(item.paymentMethod)}</td><td>${money(item.amount)}</td><td>${tag(item.paymentStatus)}</td><td>${item.paidAt || "-"}</td></tr>
          `))}</div>
          <div class="panel"><h2>退款记录</h2>${table(["退款流水", "售后单", "订单", "买家", "方式", "金额", "状态"], state.refunds.map(item => `
            <tr><td>${item.refundNo}</td><td>${item.afterSaleNo}</td><td>${item.orderNo}</td><td>${item.buyerName}</td><td>${item.refundMethod}</td><td>${money(item.amount)}</td><td>${tag(item.refundStatus)}</td></tr>
          `))}</div>
        </div>`;
      }

      function renderSystem() {
        return `<div class="workspace">
          <div class="panel"><h2>后台账号</h2>${table(["账号", "姓名", "手机号", "角色", "状态"], state.accounts.map(item => `
            <tr><td>${item.accountName}</td><td>${item.realName}</td><td>${item.phone}</td><td>${item.role}</td><td>${tag(item.status)}</td></tr>
          `))}</div>
          <div class="panel"><h2>角色权限</h2>${table(["角色", "说明", "账号数", "状态"], state.roles.map(item => `
            <tr><td>${item.roleName}</td><td>${item.description}</td><td>${item.accountCount}</td><td>${tag(item.status)}</td></tr>
          `))}
          <h2 style="margin-top:18px">权限树</h2>${table(["模块", "按钮权限"], state.permissions.map(item => `<tr><td>${item.module}</td><td>${item.actions.join(" / ")}</td></tr>`))}</div>
        </div>`;
      }

      function renderMallHome() {
        return `<div class="workspace">
          <div>
            <div class="panel" style="margin-bottom:16px"><h2>企业采购商城</h2><p class="muted">买家：${state.profile?.buyerName || "-"} / ${state.profile?.companyName || "-"}</p></div>
            <div class="mall-grid">${state.products.filter(item => item.saleStatus === "ON_SALE").map(productTile).join("")}</div>
          </div>
          <div class="panel">
            <h2>购物车</h2>
            ${table(["商品", "数量", "价格"], (state.cart?.items || []).map(item => `<tr><td>${item.productName}</td><td>${item.quantity}</td><td>${money(item.salePrice)}</td></tr>`))}
            <p class="price">合计 ${money(state.cart?.checkedAmount || 0)}</p>
          </div>
        </div>`;
      }

      function productTile(product) {
        return `<div class="product-tile">
          <div class="product-image">${product.skuCode}</div>
          <h2 style="margin-top:12px">${product.productName}</h2>
          <p class="muted">${product.skuName} / 起订 ${product.minOrderQuantity}${product.unit} / 库存 ${product.stockQuantity}</p>
          <div class="price">${money(product.salePrice)}</div>
          <div class="toolbar" style="margin-top:12px"><button class="btn" onclick="submitOrder(${product.id})">立即采购</button><button class="btn secondary" onclick="toast('已加入购物车演示')">加购物车</button></div>
        </div>`;
      }

      function renderMallOrders() {
        return `<div class="panel"><h2>买家订单</h2>${table(["订单号", "金额", "状态", "支付", "发货", "收货信息", "操作"], state.orders.map(order => `
          <tr><td>${order.orderNo}</td><td>${money(order.totalAmount)}</td><td>${tag(order.orderStatus)}</td><td>${tag(order.paymentStatus)}</td><td>${tag(order.fulfillmentStatus)}</td><td>${order.receiverName} ${order.receiverPhone}<br><span class="muted">${order.receiverAddress}</span></td><td>${order.orderStatus === "WAIT_RECEIVE" ? `<button class="btn" onclick="mallConfirmReceipt(${order.id})">确认收货</button>` : `<span class="muted">-</span>`}</td></tr>
        `))}</div>`;
      }

      function renderMallInvoices() {
        return `<div class="workspace">
          <div class="panel"><div class="panel-head"><h2>我的开票申请</h2><button class="btn" onclick="createInvoice()">提交开票</button></div>${table(["申请单", "订单", "抬头", "类型", "金额", "状态"], state.invoices.map(item => `<tr><td>${item.invoiceApplyNo}</td><td>${item.orderNo}</td><td>${item.title}</td><td>${item.invoiceType}</td><td>${money(item.amount)}</td><td>${tag(item.status)}</td></tr>`))}</div>
          <div class="panel"><h2>发票规则</h2><p class="notice">一期暂不对接真实电子发票平台，后台确认开票后记录发票号码和状态。</p></div>
        </div>`;
      }

      function renderMini(page) {
        const title = page === "miniHome" ? "B2B 小程序商城" : page === "miniOrders" ? "订单与售后" : "移动开票";
        let body = "";
        if (page === "miniHome") {
          body = state.products.filter(item => item.saleStatus === "ON_SALE").map(product => `<div class="product-tile"><strong>${product.productName}</strong><p class="muted">${product.skuName}</p><div class="price">${money(product.salePrice)}</div><button class="btn" onclick="submitOrder(${product.id})">采购</button></div>`).join("");
        } else if (page === "miniOrders") {
          body = state.orders.map(order => `<div class="product-tile"><strong>${order.orderNo}</strong><p>${tag(order.orderStatus)} ${tag(order.paymentStatus)}</p><button class="btn secondary" onclick="createAfterSale()">申请售后</button></div>`).join("");
        } else {
          body = `<div class="product-tile"><strong>默认抬头</strong><p class="muted">杭州某某商贸有限公司</p><button class="btn" onclick="createInvoice()">提交开票申请</button></div>${state.invoices.map(item => `<div class="product-tile"><strong>${item.invoiceApplyNo}</strong><p>${item.title}</p>${tag(item.status)}</div>`).join("")}`;
        }
        return `<div class="phone-shell"><div class="phone-screen"><div class="phone-header">${title}</div><div class="phone-body">${body}</div></div></div>`;
      }

      function render() {
        renderShell();
        const views = {
          dashboard: renderDashboard,
          products: renderProducts,
          purchase: renderPurchase,
          inventory: renderInventory,
          orders: renderOrders,
          afterSales: renderAfterSales,
          invoices: renderInvoices,
          finance: renderFinance,
          system: renderSystem,
          mallHome: renderMallHome,
          mallOrders: renderMallOrders,
          mallInvoices: renderMallInvoices,
          miniHome: () => renderMini("miniHome"),
          miniOrders: () => renderMini("miniOrders"),
          miniInvoice: () => renderMini("miniInvoice")
        };
        byId("root").innerHTML = (views[state.page] || renderDashboard)();
      }

      async function loadAndRender() {
        await refreshData();
        render();
      }

      async function quickCreateProduct() {
        await post("/api/admin/products", {
          productName: "农夫山泉饮用水",
          skuName: "550ml x 24瓶",
          unit: "箱",
          salePrice: 42,
          stockQuantity: 100,
          minOrderQuantity: 1
        });
        toast("商品已新增并上架");
        loadAndRender();
      }

      async function toggleProduct(id, current) {
        await put(`/api/admin/products/${id}/${current === "ON_SALE" ? "off-sale" : "on-sale"}`);
        toast("商品状态已更新");
        loadAndRender();
      }

      async function stockIn(id, productId) {
        const result = await post(`/api/admin/purchase-orders/${id}/stock-in`, { productId, quantity: 100 });
        toast(`采购入库成功，库存后 ${result.stockAfter}`);
        loadAndRender();
      }

      function stockInFirst() {
        const item = state.purchases[0];
        if (item) stockIn(item.id, item.targetProductId);
      }

      async function adjustFirst() {
        const item = state.products[0];
        if (!item) return;
        const result = await post("/api/admin/inventory/adjustments", { productId: item.id, quantity: 10 });
        toast(`库存已调增，库存后 ${result.stockAfter}`);
        loadAndRender();
      }

      async function orderAction(id, action) {
        const payload = action === "ship" ? { shippingMethod: "EXPRESS", logisticsCompany: "顺丰速运", trackingNo: `SF${Date.now()}` } : {};
        await post(`/api/orders/${id}/${action}`, payload);
        toast("订单状态已更新");
        loadAndRender();
      }

      async function submitOrder(productId) {
        const product = state.products.find(item => item.id === productId);
        const customerId = 1;
        await post("/api/orders", {
          customerId,
          paymentMethod: "ONLINE_PAY",
          receiverName: "杭州采购王",
          receiverPhone: "13800010001",
          receiverAddress: "浙江省杭州市西湖区文三路 188 号",
          remark: "商城端下单",
          items: [{ productId, quantity: product.minOrderQuantity || 1 }]
        });
        toast("采购订单已提交，库存已扣减");
        state.channel = "mall";
        state.page = "mallOrders";
        loadAndRender();
      }

      async function mallConfirmReceipt(id) {
        await post(`/api/mall/orders/${id}/confirm-receipt`);
        toast("已确认收货");
        loadAndRender();
      }

      async function createAfterSale() {
        await post("/api/mall/after-sales", { orderNo: state.orders[0]?.orderNo || "-", buyerName: "杭州采购王", type: "ONLY_REFUND", refundAmount: 72 });
        toast("售后申请已提交");
        loadAndRender();
      }

      async function auditAfterSale(id) {
        await post(`/api/admin/after-sales/${id}/audit`, { approved: true, remark: "同意售后" });
        toast("售后审核通过");
        loadAndRender();
      }

      async function refundAfterSale(id) {
        await post(`/api/admin/after-sales/${id}/refund`);
        toast("退款已处理");
        loadAndRender();
      }

      async function createInvoice() {
        await post("/api/mall/invoices", { orderNo: state.orders[0]?.orderNo || "-", buyerName: "杭州采购王", invoiceType: "电子普票", title: "杭州某某商贸有限公司", amount: state.orders[0]?.totalAmount || 560 });
        toast("开票申请已提交");
        loadAndRender();
      }

      async function confirmInvoice(id) {
        await post(`/api/admin/invoices/${id}/confirm`);
        toast("已确认开票");
        loadAndRender();
      }

      async function rejectInvoice(id) {
        await post(`/api/admin/invoices/${id}/reject`, { reason: "开票资料不完整" });
        toast("开票申请已驳回");
        loadAndRender();
      }

      loadAndRender();
    </script>
  </body>
</html>
