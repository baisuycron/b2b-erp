server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: b2b-api
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/b2b_erp?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    validate-on-migrate: false
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health

b2b:
  product-thumbnail:
    directory: ${PRODUCT_THUMBNAIL_DIR:./uploads/products/thumb}
    url-prefix: /api/public/product-thumbnails
  product-image:
    directory: ${PRODUCT_IMAGE_DIR:./uploads/products/images}
    url-prefix: /api/public/product-images
  auth:
    token-ttl: ${B2B_AUTH_TOKEN_TTL:PT24H}
    token-secret: ${B2B_AUTH_TOKEN_SECRET:b2b-erp-production-token-signing-key-2026}
  image-search:
    enabled: ${IMAGE_SEARCH_ENABLED:false}
    embedding-service-url: ${IMAGE_EMBEDDING_SERVICE_URL:}
    qdrant-url: ${QDRANT_URL:}
    qdrant-api-key: ${QDRANT_API_KEY:}
    collection: ${IMAGE_VECTOR_COLLECTION:product-images}
    top-k-default: ${IMAGE_SEARCH_TOP_K_DEFAULT:20}
    minimum-score: ${IMAGE_SEARCH_MINIMUM_SCORE:0.96}
    embedding-model: ${IMAGE_EMBEDDING_MODEL:b2b-visual-signature-v4}
  ai:
    mode: ${AI_MODE:rule}
    openai-api-key: ${OPENAI_API_KEY:}
    model: ${AI_MODEL:gpt-4.1-mini}
